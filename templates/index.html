<!DOCTYPE html>
<html>
<head>
    <title>BreachGuard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            width: 90%;
            border: none;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 5px;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        .safe {
            background: green;
        }

        .breached {
            background: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔐 BreachGuard</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Enter email" required>
        <button type="submit">Check</button>
    </form>

    {% if result is defined %}
        {% if "no breach" in result.lower() %}
            <div class="result safe">
                {{ result }}
            </div>
        {% else %}
            <div class="result breached">
                {{ result }}
            </div>
        {% endif %}
    {% endif %}

</div>

</body>
</html>
